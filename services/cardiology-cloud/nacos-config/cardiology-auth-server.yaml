server:
  port: 30002

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/cardiology_auth?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}

aliyun:
  access-key-id: ${ALIYUN_ACCESS_KEY_ID:your-access-key-id}
  access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:your-access-key-secret}

auth:
  sms:
    sign-name: ${AUTH_SMS_SIGN_NAME:速通互联验证码}
    template-code: ${AUTH_SMS_TEMPLATE_CODE:100001}
    send-interval: 60
    code-valid-minutes: 5
    send-lock-key: "cardiology:sms:send:lock:"
    code-key: "cardiology:sms:send:code:"
    captcha-chars: "23456789ABCDEFGHJKLMNPQRSTUVWXYZ"
  guest:
    key: "cardiology:guest:session:"
    time: 3600

jwt:
  sign-key: ${JWT_SIGN_KEY:zengxiangrui-daming-cardiology-intelligent-agent-platform}
  token-validity: 7200
