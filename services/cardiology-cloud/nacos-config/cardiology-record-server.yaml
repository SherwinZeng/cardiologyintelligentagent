spring:
  main:
    web-application-type: none
    keep-alive: true

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/cardiology?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:cardiology}
    password: ${SPRING_DATASOURCE_PASSWORD:cardiology}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:127.0.0.1}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:cardiology}
    password: ${SPRING_RABBITMQ_PASSWORD:cardiology}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml

cardiology:
  ai-agent:
    base-url: ${CARDIOLOGY_AI_AGENT_BASE_URL:http://127.0.0.1:8000/api/cardiology/}

  session-lifecycle:
    inactive-days: 15
    purge-days: 7
    archive-batch-size: 100
    purge-batch-size: 100
    archive-cron: "0 0 2 * * ?"
    purge-cron: "0 30 2 * * ?"

  consultation-summary:
    enabled: true
    # 本地联调：2 分钟空闲 + 低消息门槛；生产请改回 idle-minutes=60 min-messages=20 poll-interval-ms=60000
    idle-minutes: ${CARDIOLOGY_CONSULTATION_SUMMARY_IDLE_MINUTES:2}
    min-messages: ${CARDIOLOGY_CONSULTATION_SUMMARY_MIN_MESSAGES:4}
    process-batch-size: 20
    max-messages: 120
    max-retry-count: 3
    poll-interval-ms: ${CARDIOLOGY_CONSULTATION_SUMMARY_POLL_MS:15000}

  mq:
    enabled: true
    session-index:
      exchange: cardiology.session.exchange
      queue: cardiology.session.index.queue
      routing-key: session.index.updated
    session-lifecycle:
      exchange: cardiology.session.exchange
      queue: cardiology.session.lifecycle.queue
      routing-key: session.lifecycle.archived
    consultation-summary-schedule:
      exchange: cardiology.session.exchange
      queue: cardiology.session.summary.schedule.queue
      routing-key: session.summary.schedule
