server:
  port: 30000

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      discovery:
        locator:
          enabled: false
      routes:
        - id: cardiology-auth
          uri: lb://cardiology-auth-server
          predicates:
            - Path=/auth/**
          filters:
            - name: Retry
              args:
                retries: 1
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
        - id: cardiology-session
          uri: lb://cardiology-session-server
          predicates:
            - Path=/chat/**
          filters:
            - name: Retry
              args:
                retries: 1
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
auth:
  guest:
    key: "cardiology:guest:session:"

jwt:
  sign-key: ${JWT_SIGN_KEY:zengxiangrui-daming-cardiology-intelligent-agent-platform}

cardiology:
  auth:
    exclude-paths:
      - /auth/**
