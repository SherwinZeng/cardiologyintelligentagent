server:
  port: 30001

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/cardiology?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:cardiology}
    password: ${SPRING_DATASOURCE_PASSWORD:cardiology}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:127.0.0.1}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:cardiology}
    password: ${SPRING_RABBITMQ_PASSWORD:cardiology}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml

cardiology:
  ai-agent:
    base-url: ${CARDIOLOGY_AI_AGENT_BASE_URL:http://127.0.0.1:8000/api/cardiology/}

  guest:
    chat:
      key-prefix: "cardiology:guest:chat:"
      ttl-seconds: 3600
      max-sessions: 5
      max-user-messages: 30

  mq:
    enabled: true
    session-index:
      exchange: cardiology.session.exchange
      queue: cardiology.session.index.queue
      routing-key: session.index.updated
    session-lifecycle:
      exchange: cardiology.session.exchange
      queue: cardiology.session.lifecycle.queue
      routing-key: session.lifecycle.archived
