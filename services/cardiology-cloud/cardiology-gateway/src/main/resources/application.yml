# 默认配置（local / docker 共用路由与业务项）；docker 连接信息见 application-docker.yml
server:
  port: 30000

spring:
  profiles:
    default: local
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      discovery:
        locator:
          enabled: false
      routes:
        - id: cardiology-auth
          uri: lb://cardiology-auth-server
          predicates:
            - Path=/auth/**
          filters:
            - name: Retry
              args:
                retries: 1
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
        - id: cardiology-session-understanding
          uri: lb://cardiology-session-server
          predicates:
            - Path=/chat/generalUnderstanding/**
          filters:
            - name: Retry
              args:
                retries: 1
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
        - id: cardiology-session
          uri: lb://cardiology-session-server
          predicates:
            - Path=/chat/**
          filters:
            - name: Retry
              args:
                retries: 1
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE

auth:
  guest:
    key: "cardiology:guest:session:"

jwt:
  sign-key: zengxiangrui-daming-cardiology-intelligent-agent-platform

cardiology:
  auth:
    exclude-paths:
      - /auth/**
