# 本地 profile=local（默认）；Docker 生产见 application-docker.yml（profile=docker）
spring:
  profiles:
    default: local
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "http://localhost:*"
              - "http://127.0.0.1:*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
      discovery:
        locator:
          enabled: false

server:
  port: 30000

jwt:
  sign-key: change-me-to-the-same-value-as-auth-service

auth:
  guest:
    key: "cardiology:guest:session:"
    time: 3600

cardiology:
  auth:
    exclude-paths:
      - /auth/guest/login/**
      - /auth/sms/login/sms/**
      - /auth/sms/login/captcha/**
      - /auth/sms/login/v1
