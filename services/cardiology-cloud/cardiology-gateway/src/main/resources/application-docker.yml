# Docker Compose 生产（profile: docker）
# 路由 / JWT / CORS 来自 Nacos：cardiology-gateway-server.yaml

spring:
  config:
    import: optional:nacos:${spring.application.name}.yaml
  cloud:
    nacos:
      server-addr: nacos:8848
      config:
        enabled: true
      discovery:
        enabled: true
    sentinel:
      enabled: false
