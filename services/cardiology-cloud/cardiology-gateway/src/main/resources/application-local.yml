# profile=local：Nacos 仅服务发现；业务配置见 application.yml
spring:
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      config:
        enabled: false
      discovery:
        enabled: true
    sentinel:
      enabled: true
      eager: true
      transport:
        dashboard: ${SENTINEL_DASHBOARD_HOST:127.0.0.1}:${SENTINEL_DASHBOARD_PORT:18858}
      datasource:
        gw-flow:
          file:
            file: classpath:sentinel-gateway-flow-rules.json
            data-type: json
            rule-type: gw-flow
