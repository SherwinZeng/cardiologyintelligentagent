# Docker Compose 生产（profile: docker）
# 业务配置来自 Nacos：cardiology-auth-server.yaml（deploy 时 nacos-init 自动导入）

spring:
  config:
    import: optional:nacos:${spring.application.name}.yaml
  cloud:
    nacos:
      server-addr: nacos:8848
      config:
        enabled: true
      discovery:
        enabled: true
