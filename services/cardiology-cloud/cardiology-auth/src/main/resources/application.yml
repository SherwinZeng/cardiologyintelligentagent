# 默认配置
# local：Nacos 配置中心（bootstrap.yml + application-local.yml）
# docker：本文件 + application-docker.yml + deploy/.env
server:
  port: 30002

spring:
  profiles:
    default: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/cardiology-auth?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
  data:
    redis:
      host: 127.0.0.1
      port: 6379

aliyun:
  access-key-id: ${ALIYUN_ACCESS_KEY_ID:your-access-key-id}
  access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:your-access-key-secret}

auth:
  sms:
    sign-name: 速通互联验证码
    template-code: "100001"
    send-interval: 60
    code-valid-minutes: 5
    send-lock-key: "cardiology:sms:send:lock:"
    code-key: "cardiology:sms:send:code:"
    captcha-chars: "23456789ABCDEFGHJKLMNPQRSTUVWXYZ"
  guest:
    key: "cardiology:guest:session:"
    time: 3600

jwt:
  sign-key: zengxiangrui-daming-cardiology-intelligent-agent-platform
  token-validity: 7200
