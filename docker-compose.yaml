# cardiology-cloud 本地开发中间件
# 启动: docker compose up -d
# 停止: docker compose down

services:
  mysql:
    image: mysql:8.0
    container_name: cardiology-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cardiology
      MYSQL_USER: cardiology
      MYSQL_PASSWORD: cardiology
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - cardiology-net

  redis:
    image: redis:7.2-alpine
    container_name: cardiology-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cardiology-net

  nacos:
    image: nacos/nacos-server:latest
    container_name: cardiology-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      JVM_XMS: 256m
      JVM_XMX: 512m
      # latest 镜像启动时必须提供 Base64 token（即使本地关闭鉴权）
      NACOS_AUTH_ENABLE: "false"
      NACOS_AUTH_TOKEN: "VGhpc0lzTXlDdXN0b21TZWNyZXRLZXkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5"
      NACOS_AUTH_IDENTITY_KEY: "serverIdentity"
      NACOS_AUTH_IDENTITY_VALUE: "security"
      TZ: Asia/Shanghai
    ports:
      - "8848:8848"   # Nacos Server API（Java 客户端连这个）
      - "9848:9848"   # gRPC
      - "8080:8080"   # Nacos Console 控制台
    volumes:
      - nacos-data:/home/nacos/data
      - nacos-logs:/home/nacos/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/next/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    networks:
      - cardiology-net

networks:
  cardiology-net:
    name: cardiology-net

volumes:
  mysql-data:
  redis-data:
  nacos-data:
  nacos-logs:
