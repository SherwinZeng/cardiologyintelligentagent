name: Bug 报告
description: 反馈可复现的问题
title: "[Bug] "
body:
  - type: dropdown
    id: area
    attributes:
      label: 影响模块
      options:
        - frontend
        - cardiology-cloud
        - ai-agent
        - deploy
        - docs
        - other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明发生了什么。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开 ...
        2. 点击 ...
        3. 输入 ...
        4. 出现 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: 环境信息
      placeholder: |
        OS:
        Browser:
        Node:
        JDK:
        Python:
        Docker:
  - type: textarea
    id: logs
    attributes:
      label: 日志 / 截图
      description: 可粘贴错误日志、控制台输出或截图。
