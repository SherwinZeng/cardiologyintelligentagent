# 云服务器生产环境一键编排
# 启动: docker compose -f docker-compose.prod.yaml --env-file deploy/.env up -d --build
# 停止: docker compose -f docker-compose.prod.yaml --env-file deploy/.env down
#
# Java 服务统一 SPRING_PROFILES_ACTIVE=docker → application-docker.yml → Nacos Config
# 生产栈默认启动 Nacos；nacos-init 导入 nacos-config/，Java 注册 + 读配置

name: cardiology-prod

x-java-docker-env: &java_docker_env
  SPRING_PROFILES_ACTIVE: docker
  SPRING_CLOUD_NACOS_SERVER_ADDR: nacos:8848
  SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
  SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
  SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
  JWT_SIGN_KEY: ${JWT_SIGN_KEY}
  SPRING_DATA_REDIS_HOST: redis
  SPRING_DATA_REDIS_PORT: 6379
  SPRING_RABBITMQ_HOST: rabbitmq
  SPRING_RABBITMQ_PORT: 5672
  SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
  SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
  CARDIOLOGY_AI_AGENT_BASE_URL: http://ai-agent:8000/api/cardiology/
  SENTINEL_DASHBOARD_HOST: sentinel-dashboard
  SENTINEL_DASHBOARD_PORT: 8858
  # 注册到 Docker 网桥 IP，避免误选 127.0.0.1
  SPRING_CLOUD_INETUTILS_PREFERRED_NETWORKS: 172.

services:
  mysql:
    image: mysql:8.0
    container_name: cardiology-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          '127.0.0.1',
          '-u${MYSQL_USER}',
          '-p${MYSQL_PASSWORD}',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - cardiology-net

  redis:
    image: redis:7.2-alpine
    container_name: cardiology-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - cardiology-net

  postgres:
    image: docker.m.daocloud.io/library/postgres:16-alpine
    container_name: cardiology-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cardiology}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cardiology}
      POSTGRES_DB: ${POSTGRES_DB:-cardiology}
      TZ: Asia/Shanghai
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-cardiology} -d ${POSTGRES_DB:-cardiology}']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - cardiology-net

  nacos:
    image: nacos/nacos-server:latest
    container_name: cardiology-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      JVM_XMS: 256m
      JVM_XMX: 512m
      NACOS_AUTH_ENABLE: 'false'
      NACOS_AUTH_TOKEN: 'VGhpc0lzTXlDdXN0b21TZWNyZXRLZXkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5'
      NACOS_AUTH_IDENTITY_KEY: serverIdentity
      NACOS_AUTH_IDENTITY_VALUE: security
      TZ: Asia/Shanghai
    volumes:
      - nacos-data:/home/nacos/data
      - nacos-logs:/home/nacos/logs
    # 仅绑定本机，供 SSH 隧道从本地访问控制台；勿改成 0.0.0.0 对公网开放
    ports:
      - '127.0.0.1:8080:8080'
      - '127.0.0.1:8848:8848'
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://127.0.0.1:8848/nacos/ || exit 1']
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
    networks:
      - cardiology-net

  nacos-init:
    image: curlimages/curl:8.5.0
    container_name: cardiology-nacos-init
    restart: 'no'
    depends_on:
      nacos:
        condition: service_healthy
    volumes:
      - ./services/cardiology-cloud/nacos-config:/nacos-config:ro
    environment:
      NACOS_ADDR: http://nacos:8848
    entrypoint: ['/bin/sh', '/nacos-config/import.sh', '/nacos-config']
    networks:
      - cardiology-net

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: cardiology-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - '127.0.0.1:15672:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - cardiology-net

  sentinel-dashboard:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/bladex/sentinel-dashboard:1.8.6
    platform: linux/amd64
    container_name: cardiology-sentinel-dashboard
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    # 仅本机 + SSH 隧道访问；账号 sentinel / sentinel
    ports:
      - '127.0.0.1:8858:8858'
    networks:
      - cardiology-net

  ai-agent:
    build:
      context: ./services/ai-agent
    container_name: cardiology-ai-agent
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      QIANWEN_API_KEY: ${QIANWEN_API_KEY:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-cardiology}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cardiology}
      POSTGRES_DB: ${POSTGRES_DB:-cardiology}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-cardiology-intelligent-agent}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - cardiology-net

  cardiology-auth:
    build:
      context: ./services/cardiology-cloud
      args:
        APP_MODULE: cardiology-auth
        APP_PORT: 30002
    container_name: cardiology-auth
    restart: unless-stopped
    environment:
      <<: *java_docker_env
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cardiology-auth?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SERVER_PORT: 30002
      ALIYUN_ACCESS_KEY_ID: ${ALIYUN_ACCESS_KEY_ID}
      ALIYUN_ACCESS_KEY_SECRET: ${ALIYUN_ACCESS_KEY_SECRET}
      AUTH_SMS_SIGN_NAME: ${AUTH_SMS_SIGN_NAME:-速通互联验证码}
      AUTH_SMS_TEMPLATE_CODE: ${AUTH_SMS_TEMPLATE_CODE:-100001}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      nacos-init:
        condition: service_completed_successfully
    networks:
      - cardiology-net

  cardiology-session:
    build:
      context: ./services/cardiology-cloud
      args:
        APP_MODULE: cardiology-session
        APP_PORT: 30001
    container_name: cardiology-session
    restart: unless-stopped
    environment:
      <<: *java_docker_env
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SERVER_PORT: 30001
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy
      nacos-init:
        condition: service_completed_successfully
      ai-agent:
        condition: service_started
    networks:
      - cardiology-net

  cardiology-record:
    build:
      context: ./services/cardiology-cloud
      args:
        APP_MODULE: cardiology-record
        APP_PORT: 8080
    container_name: cardiology-record
    restart: unless-stopped
    environment:
      <<: *java_docker_env
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy
      nacos-init:
        condition: service_completed_successfully
    networks:
      - cardiology-net

  cardiology-gateway:
    build:
      context: ./services/cardiology-cloud
      args:
        APP_MODULE: cardiology-gateway
        APP_PORT: 30000
    container_name: cardiology-gateway
    restart: unless-stopped
    environment:
      <<: *java_docker_env
      SERVER_PORT: 30000
    depends_on:
      nacos:
        condition: service_healthy
      nacos-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      cardiology-auth:
        condition: service_started
      cardiology-session:
        condition: service_started
    networks:
      - cardiology-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_AUTH_API_BASE_URL: ${VITE_AUTH_API_BASE_URL:-/api}
    container_name: cardiology-frontend
    restart: unless-stopped
    ports:
      - '${FRONTEND_HTTP_PORT:-80}:80'
    depends_on:
      - cardiology-gateway
    networks:
      - cardiology-net

networks:
  cardiology-net:
    name: cardiology-prod-net

volumes:
  mysql-data:
  redis-data:
  postgres-data:
  nacos-data:
  nacos-logs:
  rabbitmq-data:
